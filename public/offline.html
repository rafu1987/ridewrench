<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Offline - RideWrench</title>
		<meta name="robots" content="noindex,nofollow" />
		<style>
			:root {
				color-scheme: dark;
				font-family:
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					sans-serif;
				background: #0f141b;
				color: #f4f6f8;
			}

			body {
				min-height: 100vh;
				margin: 0;
				display: grid;
				place-items: center;
				padding: 24px;
			}

			main {
				max-width: 520px;
				text-align: center;
			}

			.mark {
				width: 72px;
				height: 72px;
				margin: 0 auto 24px;
				border-radius: 24px;
				display: grid;
				place-items: center;
				background: #fc4c02;
				color: #fff;
				font-size: 32px;
				font-weight: 800;
			}

			h1 {
				margin: 0 0 12px;
				font-size: 32px;
			}

			p {
				margin: 0 0 24px;
				color: #b9c0ca;
				line-height: 1.6;
			}

			a {
				display: inline-block;
				padding: 12px 18px;
				border-radius: 999px;
				background: #fc4c02;
				color: #fff;
				text-decoration: none;
				font-weight: 700;
			}
		</style>
	</head>
	<body>
		<main>
			<div class="mark">RW</div>
			<h1>You are offline</h1>
			<p>RideWrench needs an internet connection to sync rides, load your bikes and update maintenance reminders.</p>
			<a href="/">Try again</a>
		</main>
	</body>
</html>
